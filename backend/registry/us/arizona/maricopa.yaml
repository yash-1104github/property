# Maricopa County, Arizona — Assessor GIS parcels (REST) + optional Regrid fallback.
# Human portal: https://mcassessor.maricopa.gov/
# Parcel layer: https://gis.mcassessor.maricopa.gov/arcgis/rest/services/Parcels/MapServer/0

jurisdiction:
  country: US
  state: AZ
  county: Maricopa
  municipality: null

sources:
  - name: Maricopa Parcels — ArcGIS REST (County Assessor GIS)
    base_url: https://gis.mcassessor.maricopa.gov
    search_type: address
    data_types:
      - parcel
      - ownership
      - valuation
    scraper: us_arcgis_parcel_query
    requires_browser: false
    params:
      layer_url: https://gis.mcassessor.maricopa.gov/arcgis/rest/services/Parcels/MapServer/0
      preset: maricopa_az
    last_verified: "2026-04-19"

  - name: Regrid — nationwide parcel API (optional)
    base_url: https://regrid.com
    search_type: address
    data_types:
      - parcel
      - ownership
    scraper: us_regrid_parcel
    requires_browser: false
    params:
      regrid_path: /us/az/maricopa
    last_verified: "2026-04-19"
