# Cook County, Illinois (includes Chicago). Assessor: https://www.cookcountyassessor.com/
# Parcel GIS (hosted): https://gis.cookcountyil.gov/hosting/rest/services/Hosted/Parcel/FeatureServer/0

jurisdiction:
  country: US
  state: IL
  county: Cook
  municipality: null

sources:
  - name: Cook County Assessor — Parcel Addresses (open data API)
    base_url: https://datacatalog.cookcountyil.gov
    search_type: address
    data_types:
      - parcel
      - ownership
    scraper: us_cook_assessor_parcel_addresses
    requires_browser: false
    params:
      resource_url: https://datacatalog.cookcountyil.gov/resource/3723-97qp.json
      assessed_values_resource_url: https://datacatalog.cookcountyil.gov/resource/uzyt-m557.json
      treasurer_tax_enrich: true
      # Headless Treasurer requests often return HTML with no dollar amounts (bot mitigation).
      # Use treasurer_headless: false or COOK_TREASURER_HEADLESS=false with a visible browser.
      treasurer_headless: true
      treasurer_search_url: https://www.cookcountytreasurer.com/yourpropertytaxoverviewsearch.aspx
      loan_history_enrich: true
      mortgages_2011_resource_url: https://datacatalog.cookcountyil.gov/resource/33fu-uwca.json
      mortgages_2012_resource_url: https://datacatalog.cookcountyil.gov/resource/myuk-usmm.json
      mortgages_2013_2015_resource_url: https://datacatalog.cookcountyil.gov/resource/4f2q-h3b7.json
      # Clerk portal is often Cloudflare-blocked for automated clients; enable only when needed.
      clerk_loan_scrape: false
    last_verified: "2026-04-22"

  - name: Cook County — Hosted Parcels (ArcGIS REST)
    base_url: https://gis.cookcountyil.gov
    search_type: address
    data_types:
      - parcel
      - ownership
    scraper: us_arcgis_parcel_query
    requires_browser: false
    params:
      layer_url: https://gis.cookcountyil.gov/hosting/rest/services/Hosted/Parcel/FeatureServer/0
      preset: cook_il
    last_verified: "2026-04-21"

  - name: Regrid — Cook / IL (optional API)
    base_url: https://regrid.com
    search_type: address
    data_types:
      - parcel
      - ownership
    scraper: us_regrid_parcel
    requires_browser: false
    params:
      regrid_path: /us/il/cook
    last_verified: "2026-04-21"
