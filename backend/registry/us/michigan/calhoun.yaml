# Calhoun County, MI — sources indexed from NETR Online public records directory.
# Directory: https://publicrecords.netronline.com/state/MI/county/calhoun
#
# Order matters after sorting (HTTP before browser): ArcGIS REST is tried before BS&A.
# Battle Creek hosts county-wide parcel attributes (owner, PIN, acreage) via ArcGIS REST.
# BS&A remains for full tax tabs when the portal allows automation.

jurisdiction:
  country: US
  state: MI
  county: Calhoun
  municipality: null

sources:
  - name: Calhoun County Parcels — ArcGIS REST (Battle Creek GIS)
    base_url: https://gis.battlecreekmi.gov
    search_type: address
    data_types:
      - parcel
      - ownership
      - valuation
    scraper: us_arcgis_parcel_query
    requires_browser: false
    params:
      layer_url: https://gis.battlecreekmi.gov/mapping/rest/services/Basemap/FeatureServer/11
    last_verified: "2026-04-18"

  - name: BS&A — Calhoun County Equalization (NETR Online directory)
    base_url: https://bsaonline.com
    uid: "662"
    search_type: address
    data_types:
      - tax
      - ownership
      - parcel
      - valuation
      - building_info
    scraper: us_michigan_bsa_online
    requires_browser: true
    params:
      netronline_directory_url: https://publicrecords.netronline.com/state/MI/county/calhoun
      netronline_agency: Calhoun Equalization Office
    last_verified: "2026-04-14"

  - name: BS&A — Bedford Charter Township
    base_url: https://bsaonline.com
    uid: "995"
    search_type: address
    data_types:
      - tax
      - ownership
      - parcel
      - valuation
      - building_info
    scraper: us_michigan_bsa_online
    requires_browser: true
    params:
      notes: Use when county-wide Equalization search does not return the parcel
    last_verified: "2026-04-14"

  - name: Regrid — nationwide parcel API (optional fallback)
    base_url: https://regrid.com
    search_type: address
    data_types:
      - parcel
      - ownership
    scraper: us_regrid_parcel
    requires_browser: false
    params:
      regrid_path: /us/mi/calhoun
    last_verified: "2026-04-19"

# FetchGIS (browser map UI) — optional manual lookup:
#   https://app.fetchgis.com/?currentMap=calhoun
# No shipped scraper; use ArcGIS REST or BS&A above.
